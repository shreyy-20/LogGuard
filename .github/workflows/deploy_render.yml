name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render Deploys
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID_WEB: ${{ secrets.RENDER_SERVICE_ID_WEB || vars.RENDER_SERVICE_ID_WEB }}
    steps:
      - name: Validate Render deploy configuration
        run: |
          missing=()

          if [ -z "$RENDER_API_KEY" ]; then
            missing+=("RENDER_API_KEY (GitHub secret)")
          fi

          if [ -z "$RENDER_SERVICE_ID_WEB" ]; then
            missing+=("RENDER_SERVICE_ID_WEB (GitHub secret or repository variable)")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: Missing Render deploy configuration:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Trigger Render Web Deploy
        run: |
          set -e
          echo "Triggering Render deploy for web service..."
          curl -sSf -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID_WEB}/deploys" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -d '{}'
