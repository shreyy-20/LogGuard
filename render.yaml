# Render service definitions for LogGuard
# You can import this file in the Render dashboard or use it as a starting point.

services:
  - type: web
    name: LogGuard
    runtime: docker
    branch: main
    plan: starter
    buildCommand: ""
    startCommand: "bash ./scripts/render_start.sh"
    envVars:
      - key: DB_PATH
        value: data/logguard.db
        sync: false
      - key: LOGS_DIR
        value: logs
        sync: false
      - key: DEMO_LOGS
        value: "true"
        sync: false
